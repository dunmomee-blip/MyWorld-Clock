<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock</title>
    <link rel="stylesheet" href="style/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select name="" id="city">
        <option value="">Select a city...</option>
        <option value="current">My Current Location</option>
        <option value="Europe/Amsterdam">Amsterdam</option>
        <option value="America/Los_Angeles">Los Angeles</option>
        <option value="Australia/Melbourne">Melbourne</option>
      </select>

      <div id="cities">
        <div class="city" id="new-york">
          <div>
            <h2>New York 🇺🇸</h2>

            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
        <div class="city" id="sydney">
          <div>
            <h2>Sydney 🇦🇺</h2>

            <div class="date"></div>
          </div>
          <div class="time"></div>
        </div>
      </div>
    </div>

    <footer>
      This project was coded by ❣️
      <a href="https://github.com/dunmomee-blip" target="_blank"
        >Tijani Rafiat</a
      >, and is open-sourced on
      <a href="https://github.com/dunmomee-blip/MyWorld-Clock" target="_blank"
        >GitHub</a
      >, and hosted on
      <a href="https://my-world-clock-sigma.vercel.app/" target="_blank"
        >Vercel</a
      >.
    </footer>

    <script src="style/style.js"></script>
  </body>
</html>
