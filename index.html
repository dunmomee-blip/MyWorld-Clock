<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select name="" id="">
        <option value="">Select a city...</option>
        <option value="">America</option>
        <option value="">Canada</option>
        <option value="">Australia</option>
      </select>

      <div class="city">
        <h2>New York 🇺🇸</h2>
      </div>
      <div class="date">Apr 10th, 2026</div>
      <div class="time">12:40:00 PM</div>

      <div class="city">
        <h2>Sydney 🇦🇺</h2>
      </div>
      <div class="date">Apr 10th, 2026</div>
      <div class="time">12:40:00 PM</div>
    </div>

    <footer>
      This project was coded by ❣️
      <a href="https://github.com/dunmomee-blip" target="_blank"
        >Tijani Rafiat</a
      >, and is open-sourced on
      <a href="https://github.com/dunmomee-blip/MyWorld-Clock" target="_blank"
        >GitHub</a
      >, and hosted on
      <a href="https://my-world-clock-sigma.vercel.app/" target="_blank"
        >Vercel</a
      >.
    </footer>

    <script src="style/style.js"></script>
  </body>
</html>
